spring.application.name=VehicleRentalSystem

# ===============================
# MySQL DataSource (MAMP - port 8889)
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:8889/vehiclerental?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# (Hibernate détecte tout seul le dialecte → inutile de le forcer)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# SQL initialization
# ===============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===============================
# Server
# ===============================
server.port=8081
spring.application.name=VehicleRentalSystem

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/vehiclerental?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# data.sql désactivé - les données viennent de phpMyAdmin/MariaDB
spring.sql.init.mode=always

# Server
server.port=8081
